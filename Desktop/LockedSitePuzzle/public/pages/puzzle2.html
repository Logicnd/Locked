<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHASE 2 // HEX DECODER</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/puzzle2.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="scanlines"></div>

  <main class="stage">
    <div class="puzzle-container">
      <div class="phase-badge">PHASE 2</div>
      
      <h1 class="title" data-text="HEX DECODER">HEX DECODER</h1>
      <p class="subtitle">The System speaks in code</p>

      <div class="instruction-card">
        <h3 class="card-title">📡 INCOMING TRANSMISSION</h3>
        <p class="card-text">Convert hexadecimal values to ASCII characters.</p>
        <p class="card-example">Example: <code>41 42 43</code> = <code>ABC</code></p>
      </div>

      <div class="hex-display-box">
        <div class="hex-label">TRANSMISSION DATA</div>
        <div id="hexData" class="hex-data">Loading...</div>
        <div class="hex-glow"></div>
      </div>

      <form id="puzzleForm" class="puzzle-form">
        <div class="input-group">
          <input id="answer" type="text" autocomplete="off" placeholder="" required />
          <label for="answer">DECODED MESSAGE</label>
          <span class="input-border"></span>
        </div>

        <div id="feedback" class="feedback"></div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">TRANSMIT</span>
        </button>
      </form>

      <div class="hint-system">
        <button id="hintBtn" class="hint-btn">💡 REQUEST HINT</button>
        <div id="hintDisplay" class="hint-display"></div>
      </div>

      <div class="attempt-counter">
        <span id="attemptCount">0</span> attempts
      </div>

      <a href="/pages/leaderboard.html" class="skip-link">Skip to Leaderboard →</a>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/puzzle2.js"></script>
</body>
</html>
