<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ELITE // LEADERBOARD</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/leaderboard.css" />
</head>
<body>
  <div class="noise"></div>
  <div class="scanlines"></div>

  <main class="stage">
    <div class="leaderboard-container">
      <div class="crown-icon">👑</div>
      
      <h1 class="title gold" data-text="ELITE">ELITE</h1>
      <p class="subtitle">Phase 2 Completers</p>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-value" id="totalSolvers">-</span>
          <span class="stat-label">TOTAL</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="yourRank">-</span>
          <span class="stat-label">YOUR RANK</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="bestTime">-</span>
          <span class="stat-label">BEST TIME</span>
        </div>
      </div>

      <div class="podium" id="podium">
        <div class="podium-slot silver">
          <div class="podium-rank">2</div>
          <div class="podium-name" id="silverName">???</div>
          <div class="podium-time" id="silverTime">--</div>
        </div>
        <div class="podium-slot gold">
          <div class="podium-crown">👑</div>
          <div class="podium-rank">1</div>
          <div class="podium-name" id="goldName">???</div>
          <div class="podium-time" id="goldTime">--</div>
        </div>
        <div class="podium-slot bronze">
          <div class="podium-rank">3</div>
          <div class="podium-name" id="bronzeName">???</div>
          <div class="podium-time" id="bronzeTime">--</div>
        </div>
      </div>

      <div class="leaderboard-list" id="leaderboardList">
        <div class="list-header">
          <span>RANK</span>
          <span>IDENTITY</span>
          <span>TIME</span>
        </div>
        <!-- Entries injected here -->
      </div>

      <div class="coming-soon">
        <p>🔒 Phase 3 coming soon...</p>
      </div>

      <div class="nav-links">
        <a href="/pages/unlocked.html" class="nav-link">← Back to Hub</a>
        <button id="logoutBtn" class="nav-link danger">Disconnect</button>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/terminal.js"></script>
  <script src="/js/leaderboard.js"></script>
</body>
</html>
